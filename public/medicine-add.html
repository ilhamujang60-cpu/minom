<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Obat - Minom</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">💊</span>
        <h1>Tambah Obat/Vitamin</h1>
      </div>
      <p class="subtitle">Isi detail obat atau vitamin yang mau anda pantau</p>

      <div id="error-box" class="alert alert-error" style="display: none;"></div>

      <form id="medicine-form" class="auth-form">
        <div class="form-group">
          <label for="nama">Nama Obat/Vitamin</label>
          <input type="text" id="nama" name="nama" placeholder="Contoh: Vitamin C, Amoxicillin" required />
        </div>

        <div class="form-group">
          <label for="dosis">Dosis</label>
          <input type="text" id="dosis" name="dosis" placeholder="Contoh: 500mg, 1 tablet" />
        </div>

        <div class="form-group">
          <label for="jenis">Jenis</label>
          <select id="jenis" name="jenis" required>
            <option value="obat">Obat</option>
            <option value="vitamin">Vitamin</option>
            <option value="suplemen">Suplemen</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tanggal_mulai">Tanggal Mulai</label>
          <input type="date" id="tanggal_mulai" name="tanggal_mulai" />
        </div>

        <div class="form-group">
          <label for="tanggal_selesai">Tanggal Selesai (opsional)</label>
          <input type="date" id="tanggal_selesai" name="tanggal_selesai" />
          <small style="color:#9ca3af; font-size:12px;">Kosongkan kalau konsumsi rutin tanpa batas waktu (misal vitamin harian)</small>
        </div>

        <div class="form-group">
          <label for="catatan">Catatan (opsional)</label>
          <input type="text" id="catatan" name="catatan" placeholder="Contoh: diminum setelah makan" />
        </div>

        <button type="submit" class="btn-primary">Simpan</button>
      </form>

      <p class="auth-footer">
        <a href="/dashboard.html">← Kembali ke Dashboard</a>
      </p>
    </div>
  </div>

  <script src="/js/bg-dots.js"></script>
  <script src="/js/medicine-add.js"></script>
</body>
</html>
