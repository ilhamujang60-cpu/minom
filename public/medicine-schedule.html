<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atur Jadwal - Minom</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">⏰</span>
        <h1>Atur Jadwal</h1>
      </div>
      <p class="subtitle">Jadwal minum untuk <strong id="medicine-nama">...</strong></p>

      <div id="error-box" class="alert alert-error" style="display: none;"></div>

      <form id="schedule-form" class="auth-form">
        <div class="form-group">
          <label for="jam_konsumsi">Jam Minum</label>
          <input type="time" id="jam_konsumsi" name="jam_konsumsi" required />
        </div>
        <button type="submit" class="btn-primary">+ Tambah Jam</button>
      </form>

      <div id="schedule-list" class="schedule-list"></div>
      <p id="empty-schedule" class="empty-note" style="text-align:center; margin-top:16px; display:none;">
        Belum ada jadwal jam ditambahkan.
      </p>

      <p class="auth-footer">
        <a href="/dashboard.html">← Kembali ke Dashboard</a>
      </p>
    </div>
  </div>

  <script src="/js/bg-dots.js"></script>
  <script src="/js/medicine-schedule.js"></script>
</body>
</html>
