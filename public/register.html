<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - Minom</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">💊</span>
        <h1>Minom</h1>
      </div>
      <p class="subtitle">Buat akun untuk mulai mengatur jadwal obat & vitaminmu</p>

      <!-- Tempat nampilin pesan error, diisi oleh JavaScript (register.js) -->
      <div id="error-box" class="alert alert-error" style="display: none;"></div>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" name="nama" placeholder="Nama kamu" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@contoh.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required />
        </div>

        <div class="form-group">
          <label for="konfirmasi_password">Konfirmasi Password</label>
          <input type="password" id="konfirmasi_password" name="konfirmasi_password" placeholder="Ulangi password" required />
        </div>

        <button type="submit" class="btn-primary">Daftar</button>
      </form>

      <p class="auth-footer">
        Sudah punya akun? <a href="/login.html">Masuk di sini</a>
      </p>
    </div>
  </div>

  <script src="/js/bg-dots.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
