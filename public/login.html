<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk - Minom</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">💊</span>
        <h1>Minom</h1>
      </div>
      <p class="subtitle">Masuk untuk lanjut pantau obat & vitaminmu</p>

      <div id="success-box" class="alert alert-success" style="display: none;">
        Pendaftaran berhasil! Silakan masuk.
      </div>
      <div id="error-box" class="alert alert-error" style="display: none;"></div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@contoh.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password kamu" required />
        </div>

        <button type="submit" class="btn-primary">Masuk</button>
      </form>

      <p class="auth-footer">
        Belum punya akun? <a href="/register.html">Daftar di sini</a>
      </p>
    </div>
  </div>

  <script src="/js/bg-dots.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
